name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zig-build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Verify Formatting
        run: zig fmt --check src golden_test build.zig

      - name: Build and test
        run: zig build test

      - name: Golden Parity Test
        run: zig build golden-test

      - name: Verify Fixed Path (No Float Call)
        run: |
          # 检查 fixed 相关文件是否包含 f32/@cos/@sin (排除明确的 float 实现和测试文件)
          # 把“允许 comptime、禁止运行时”规则写成严格检查
          ! awk '/^test / {exit} {print}' src/aec3/core/i16_pipeline.zig | grep -E "[^a-zA-Z0-9_]f32[^a-zA-Z0-9_]|@cos|@sin" || (echo "Found float usage in core!" && exit 1)
          ! awk '/^test / {exit} {print}' src/aec3/fft/aec3_fft_fixed.zig | grep -E "[^a-zA-Z0-9_]f32[^a-zA-Z0-9_]|@cos|@sin" || (echo "Found float usage in fft_fixed!" && exit 1)
